server {
    listen 80;
    server_name exam.sankaraeye.com;

    # Redirect all HTTP to HTTPS (certbot will fill this in automatically)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name exam.sankaraeye.com;

    # SSL — certbot will populate these
    # ssl_certificate /etc/letsencrypt/live/exam.sankaraeye.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/exam.sankaraeye.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── API (Node.js backend) ──────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Admin Panel (/admin) ───────────────────────────────────────────────
    location /admin {
        alias /opt/sankara-exam/fellowship-exam/dist/public;
        try_files $uri $uri/ /admin/index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Student Application Form (root) ───────────────────────────────────
    location / {
        root /opt/sankara-exam/fellowship/dist/public;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
