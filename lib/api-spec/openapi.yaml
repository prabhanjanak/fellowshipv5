              $ref: "#/components/schemas/UploadDocumentBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }

  /exams:
    get:
      operationId: listExams
      tags: [exams]
      security: [{ bearerAuth: [] }]
