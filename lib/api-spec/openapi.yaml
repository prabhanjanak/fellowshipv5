                items: { $ref: "#/components/schemas/Preference" }
    put:
      operationId: setMyPreferences
      tags: [preferences]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPreferencesBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Preference" }

  /documents/me:
    get:
      operationId: listMyDocuments
      tags: [documents]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
