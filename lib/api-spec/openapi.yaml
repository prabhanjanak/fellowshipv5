  /allocations/{allocationId}/letter:
    get:
      operationId: getAllocationLetter
      tags: [allocations]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: allocationId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AllocationLetter" }

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
