  /dashboard/exam-progress:
    get:
      operationId: getExamProgress
      tags: [dashboard]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: unitId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ExamProgressRow" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    LoginInput:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
      required: [email, password]

    RegisterStudentInput:
      type: object
      properties:
        fullName: { type: string }
        email: { type: string }
        phone: { type: string }
        password: { type: string }
      required: [fullName, email, phone, password]

    AuthResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/CurrentUser" }
      required: [token, user]

    CurrentUser:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        fullName: { type: string }
        role: { type: string }
        candidateId: { type: integer, nullable: true }
        unitId: { type: integer, nullable: true }
        programId: { type: integer, nullable: true }
      required: [id, email, fullName, role]

    User:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        fullName: { type: string }
        role: { type: string }
        unitId: { type: integer, nullable: true }
        unitName: { type: string, nullable: true }
        programId: { type: integer, nullable: true }
        programName: { type: string, nullable: true }
        active: { type: boolean }
        createdAt: { type: string }
      required: [id, email, fullName, role, active, createdAt]

    NewUser:
      type: object
      properties:
        email: { type: string }
        fullName: { type: string }
        password: { type: string }
        role: { type: string }
        unitId: { type: integer, nullable: true }
        programId: { type: integer, nullable: true }
      required: [email, fullName, password, role]

    Program:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        code: { type: string }
        description: { type: string, nullable: true }
        academicYear: { type: string }
        totalSeats: { type: integer }
        specialityCount: { type: integer }
        candidateCount: { type: integer }
      required: [id, name, code, academicYear, totalSeats, specialityCount, candidateCount]

    ProgramDetail:
      allOf:
        - $ref: "#/components/schemas/Program"
        - type: object
          properties:
            specialities:
              type: array
              items: { $ref: "#/components/schemas/Speciality" }
          required: [specialities]

    NewProgram:
      type: object
      properties:
        name: { type: string }
        code: { type: string }
        description: { type: string }
        academicYear: { type: string }
      required: [name, code, academicYear]

    Speciality:
      type: object
      properties:
        id: { type: integer }
        programId: { type: integer }
        name: { type: string }
        code: { type: string }
        seats: { type: integer }
        filledSeats: { type: integer }
      required: [id, programId, name, code, seats, filledSeats]

    NewSpeciality:
      type: object
      properties:
        programId: { type: integer }
        name: { type: string }
        code: { type: string }
        seats: { type: integer }
      required: [programId, name, code, seats]

    SpecialityUpdate:
      type: object
      properties:
        name: { type: string }
        seats: { type: integer }

    Unit:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
