  /exams/{examId}/questions:
    get:
      operationId: listExamQuestions
      tags: [questions]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: examId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/QuestionAdmin" }
    post:
      operationId: createQuestion
      tags: [questions]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: examId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewQuestion"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuestionAdmin" }

  /exams/{examId}/questions/bulk:
    post:
      operationId: bulkUploadQuestions
      tags: [questions]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: examId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUploadBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkUploadResult" }

  /attempts/start:
    post:
      operationId: startAttempt
      tags: [attempts]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
