openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Fellowship Entrance Exam and Seat Allocation System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: programs
  - name: specialities
  - name: units
  - name: candidates
  - name: preferences
  - name: documents
  - name: exams
  - name: questions
  - name: psychometric
  - name: attempts
  - name: interviews
  - name: doctors
  - name: rankings
  - name: allocations
  - name: dashboard
  - name: storage
    description: Object storage upload and serving endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/register-student:
    post:
      operationId: registerStudent
      tags: [auth]
      summary: Self-register as a student/candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterStudentInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List staff users (Super Admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: role
          in: query
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
    post:
      operationId: createUser
      tags: [users]
      summary: Create staff user (admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewUser"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }

  /programs:
    get:
      operationId: listPrograms
      tags: [programs]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Program" }
    post:
      operationId: createProgram
      tags: [programs]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewProgram"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Program" }

  /programs/{programId}:
    get:
      operationId: getProgram
      tags: [programs]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: programId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProgramDetail" }

  /specialities:
    get:
      operationId: listSpecialities
      tags: [specialities]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: programId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Speciality" }
    post:
      operationId: createSpeciality
      tags: [specialities]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewSpeciality"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Speciality" }

  /specialities/{specialityId}:
    patch:
      operationId: updateSpeciality
      tags: [specialities]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: specialityId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpecialityUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Speciality" }

  /units:
    get:
      operationId: listUnits
      tags: [units]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Unit" }
    post:
      operationId: createUnit
      tags: [units]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewUnit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Unit" }

  /candidates:
    get:
      operationId: listCandidates
      tags: [candidates]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: programId
          in: query
          schema: { type: integer }
        - name: unitId
          in: query
          schema: { type: integer }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Candidate" }

  /candidates/me:
    get:
      operationId: getMyCandidate
      tags: [candidates]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CandidateDetail" }
    patch:
      operationId: updateMyCandidate
      tags: [candidates]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCandidateBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CandidateDetail" }

  /candidates/{candidateId}:
    get:
      operationId: getCandidate
      tags: [candidates]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: candidateId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
