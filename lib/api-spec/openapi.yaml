      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AttemptInProgress" }

  /attempts/{attemptId}:
    get:
      operationId: getAttempt
      tags: [attempts]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: attemptId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AttemptInProgress" }

  /attempts/{attemptId}/answer:
    post:
      operationId: saveAnswer
      tags: [attempts]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: attemptId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveAnswerInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SaveAnswerResult" }

  /attempts/{attemptId}/submit:
    post:
      operationId: submitAttempt
      tags: [attempts]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: attemptId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AttemptResult" }

  /attempts/me:
    get:
      operationId: listMyAttempts
      tags: [attempts]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AttemptSummary" }

  /interviews/assignments:
    get:
      operationId: listMyInterviewAssignments
      tags: [interviews]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
