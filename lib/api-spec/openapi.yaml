    put:
      operationId: setCandidateExamAssignments
      tags: [candidates]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: candidateId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetExamAssignmentsBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CandidateExamAssignment" }

  /preferences/me:
    get:
      operationId: listMyPreferences
      tags: [preferences]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
